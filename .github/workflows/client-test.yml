name: Test Frontend
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    working-directory: ./frontend

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        continue-on-error: true
        with:
          node-version-file: 'frontend/package.json'
          registry-url: https://registry.npmjs.org/
      - run: npm install
      - run: npm run format:check
      - run: npm run check:unknown-tags:portal:ci
      - run: npm run check:unknown-tags:discocli:ci
      - run: MODE=production npm run build-ignore-errors
