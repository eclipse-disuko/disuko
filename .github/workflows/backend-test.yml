name: Test Backend
# Downloads the source code / builds the go project / runs all go tests
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

defaults:
  run:
    working-directory: ./backend

jobs:
  test:
    name: test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'backend/go.mod'
      - name: Run tests
        run: |
          go test -v ./...