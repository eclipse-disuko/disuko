name: Test Backend
# Downloads the source code / builds the go project / runs all go tests
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
      tags:
        required: false
        description: 'Test Backend'

defaults:
  run:
    working-directory: ./backend

jobs:
  test:
    name: test
    runs-on: [ ubuntu-4core-amd64 ]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ vars.GOLANG_VERSION }}
      - name: Run tests
        run: |
          go test -v ./...